<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET Verification</title>
<style>
body{
  margin:0;
  background:black;
  color:#0f0;
  font-family:monospace;
  text-align:center;
}

/* big title */
#title{
  font-size:60px;
  color:red;
  margin-top:50px;
  animation:blink 0.5s infinite;
}

/* box */
#box{
  margin-top:40px;
}

/* buttons */
button{
  padding:15px 30px;
  font-size:20px;
  margin:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.yes{background:green;color:white;}
.no{background:red;color:white;}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
</style>
</head>
<body>

<div id="title">⚠️ CUET SECURITY CHECK ⚠️</div>

<div id="box">
  <p>Suspicious activity detected on your device.</p>
  <p>Do you accept verification?</p>

  <button class="yes" onclick="yes()">YES</button>
  <button class="no" onclick="no()">NO</button>
</div>

<script>
function yes(){
  document.body.innerHTML=`
    <h1 style="color:lime;margin-top:100px;">✅ YOU ARE SAFE</h1>
    <p>You accepted verification 😄</p>
    <div style="color:cyan;">🔥 Created by Deep 🔥</div>
  `;
}

function no(){
  document.body.innerHTML=`
    <h1 style="color:red;margin-top:100px;">⚠️ WARNING ⚠️</h1>
    <p>Verification failed.</p>
    <p>System risk detected (simulated).</p>
    <div style="color:cyan;">🔥 Created by Deep 🔥</div>
  `;
}
</script>

</body>
</html>
