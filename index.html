<!DOCTYPE html>
<html>
<head>
<title>CUET Verification</title>
<style>
body {
  margin:0;
  background:black;
  color:red;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

/* BIG WARNING */
#big {
  font-size:80px;
  animation: blink 0.4s infinite;
  margin-top:20px;
}

/* Sub text */
#apps {
  font-size:35px;
  color:yellow;
  margin-top:10px;
}

/* typing text */
#text {
  margin-top:20px;
  font-size:22px;
  color:lime;
}

/* timer */
#timer {
  font-size:90px;
  margin-top:20px;
}

/* blink */
@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.1;}
  100% {opacity:1;}
}

/* screen shake */
.shake {
  animation: shake 0.2s infinite;
}
@keyframes shake {
  0% {transform: translate(2px,2px);}
  25% {transform: translate(-2px,2px);}
  50% {transform: translate(2px,-2px);}
  75% {transform: translate(-2px,-2px);}
  100% {transform: translate(0,0);}
}
</style>
</head>
<body>

<div id="big">⚠️ YOUR MOBILE IS HACKED ⚠️</div>
<div id="apps">INSTAGRAM • WHATSAPP ACCESSED</div>
<div id="text">Initializing...</div>
<div id="timer">90</div>

<script>
let text = document.getElementById("text");

let steps = [
"Connecting to CUET secure server...",
"Tracking device location...",
"Extracting social media data...",
"Instagram synced...",
"WhatsApp messages copied...",
"Finalizing breach..."
];

let i = 0;

function type(msg, cb){
  let j=0;
  let inter=setInterval(()=>{
    text.innerHTML=msg.substring(0,j);
    j++;
    if(j>msg.length){
      clearInterval(inter);
      setTimeout(cb,800);
    }
  },40);
}

function run(){
  if(i<steps.length){
    type(steps[i], ()=>{
      i++;
      run();
    });
  } else {
    startTimer();
  }
}

function startTimer(){
  let t=90;
  let timer=document.getElementById("timer");

  let c=setInterval(()=>{
    timer.innerHTML=t;
    t--;

    // vibration
    if(navigator.vibrate){
      navigator.vibrate([200,100,200]);
    }

    // last 15 sec = shake screen
    if(t<15){
      document.body.classList.add("shake");
    }

    if(t<0){
      clearInterval(c);
      document.body.innerHTML = `
        <h1 style="color:white;">😂 APRIL FOOL 😂</h1>
        <p style="color:lime;">Relax! Kuch bhi hack nahi hua 😄</p>
        <div style="color:cyan;">🔥 Created by Deep 🔥</div>
      `;
    }
  },1000);
}

run();

// soft back block
history.pushState(null,null,location.href);
window.onpopstate=function(){
  history.go(1);
};
</script>

</body>
</html>
