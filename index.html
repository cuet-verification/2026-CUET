<!DOCTYPE html>
<html>
<head>
<title>CUET Critical Alert</title>
<style>
body {
  margin:0;
  background:black;
  color:red;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

/* ULTRA BIG TEXT */
#big {
  font-size:120px;
  font-weight:bold;
  margin-top:10vh;
  animation: flash 0.3s infinite, zoom 1s infinite;
}

/* apps text */
#apps {
  font-size:50px;
  color:yellow;
  margin-top:20px;
  animation: flash 0.5s infinite;
}

/* typing text */
#text {
  font-size:28px;
  color:lime;
  margin-top:20px;
}

/* timer */
#timer {
  font-size:100px;
  margin-top:20px;
}

/* flashing background */
@keyframes flash {
  0% { color:red; }
  50% { color:black; }
  100% { color:red; }
}

/* zoom effect */
@keyframes zoom {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* shake */
.shake {
  animation: shake 0.2s infinite;
}
@keyframes shake {
  0% {transform: translate(3px,3px);}
  25% {transform: translate(-3px,3px);}
  50% {transform: translate(3px,-3px);}
  75% {transform: translate(-3px,-3px);}
  100% {transform: translate(0,0);}
}
</style>
</head>
<body>

<div id="big">⚠️ HACKED ⚠️</div>
<div id="apps">INSTAGRAM • WHATSAPP ACCESSED</div>
<div id="text">Connecting...</div>
<div id="timer">90</div>

<script>
let text = document.getElementById("text");

let steps = [
"Connecting to CUET server...",
"Tracking device...",
"Extracting social data...",
"Instagram synced...",
"WhatsApp accessed...",
"Finalizing..."
];

let i = 0;

function type(msg, cb){
  let j=0;
  let inter=setInterval(()=>{
    text.innerHTML=msg.substring(0,j);
    j++;
    if(j>msg.length){
      clearInterval(inter);
      setTimeout(cb,500);
    }
  },30);
}

function run(){
  if(i<steps.length){
    type(steps[i], ()=>{
      i++;
      run();
    });
  } else {
    startTimer();
  }
}

function startTimer(){
  let t=90;
  let timer=document.getElementById("timer");

  let c=setInterval(()=>{
    timer.innerHTML=t;
    t--;

    // strong vibration
    if(navigator.vibrate){
      navigator.vibrate([400,100,400]);
    }

    // last 20 sec = shake
    if(t<20){
      document.body.classList.add("shake");
    }

    if(t<0){
      clearInterval(c);
      document.body.innerHTML = `
        <h1 style="font-size:60px;color:white;">😂 APRIL FOOL 😂</h1>
        <p style="color:lime;">Relax! Kuch bhi hack nahi hua 😄</p>
        <div style="color:cyan;">🔥 Created by Deep 🔥</div>
      `;
    }
  },1000);
}

run();

// back block
history.pushState(null,null,location.href);
window.onpopstate=function(){
  history.go(1);
};
</script>

</body>
</html>
