<!DOCTYPE html>
<html>
<head>
<title>CUET Critical Alert</title>
<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
  color:red;
  animation:bgflash 0.5s infinite;
}

/* background flash */
@keyframes bgflash{
  0%{background:black;}
  50%{background:#300;}
  100%{background:black;}
}

/* BIG TEXT */
#big{
  font-size:140px;
  font-weight:bold;
  margin-top:8vh;
  animation:blink 0.2s infinite,zoom 0.8s infinite;
}

/* apps */
#apps{
  font-size:55px;
  color:yellow;
  margin-top:15px;
  animation:blink 0.4s infinite;
}

/* timer */
#timer{
  font-size:120px;
  margin-top:20px;
}

/* blink */
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}

/* zoom */
@keyframes zoom{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

/* shake */
.shake{
  animation:shake 0.15s infinite;
}
@keyframes shake{
  0%{transform:translate(5px,5px);}
  25%{transform:translate(-5px,5px);}
  50%{transform:translate(5px,-5px);}
  75%{transform:translate(-5px,-5px);}
  100%{transform:translate(0,0);}
}
</style>
</head>
<body>

<div id="big">⚠️ HACKED ⚠️</div>
<div id="apps">INSTAGRAM • WHATSAPP ACCESSED</div>
<div id="timer">60</div>

<script>
// sound (loop beep)
function beep(){
  try{
    let ctx=new (window.AudioContext||window.webkitAudioContext)();
    let o=ctx.createOscillator(), g=ctx.createGain();
    o.type="square"; o.frequency.value=900;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.2);
    setTimeout(()=>o.stop(),200);
  }catch(e){}
}

// timer
function start(){
  let t=60;
  let timer=document.getElementById("timer");

  let c=setInterval(()=>{
    timer.innerHTML=t;
    t--;

    // vibration
    if(navigator.vibrate){
      navigator.vibrate([300,100,300]);
    }

    // sound
    beep();

    // last 20 sec shake
    if(t<20){
      document.body.classList.add("shake");
    }

    if(t<0){
      clearInterval(c);
      document.body.innerHTML=`
        <h1 style="font-size:70px;color:white;">😂 APRIL FOOL 😂</h1>
        <p style="color:lime;">Relax! Kuch bhi hack nahi hua 😄</p>
        <div style="color:cyan;">🔥 Created by Deep 🔥</div>
      `;
    }
  },1000);
}

start();

// back block (soft)
history.pushState(null,null,location.href);
window.onpopstate=function(){
  history.go(1);
};
</script>

</body>
</html>
